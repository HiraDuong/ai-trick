# Internal Knowledge Platform - GitLab CI/CD (monorepo)
# Secrets: GitLab -> Settings -> CI/CD -> Variables (khong hardcode trong file nay).
# Legacy deploy: DEPLOY_SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_USER.
# Cloud Run deploy: GCP_PROJECT_ID, GCP_REGION, GCP_SERVICE_ACCOUNT_KEY, BACKEND_URL.

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "production")'
    - when: never

stages:
  - install
  - build
  - test
  - docker
  - deploy-backend
  - docker-frontend
  - deploy-frontend
  - deploy

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

.release_job_rules: &release_job_rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "production")'

.npm_cache: &npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/

install:
  stage: install
  image: node:20-bookworm-slim
  <<: *npm_cache
  script:
    - npm install
    - rm -rf apps/frontend/node_modules
    - npm install --prefix apps/frontend --package-lock=false --include=optional

build:
  stage: build
  image: node:20-bookworm-slim
  <<: *npm_cache
  needs: ["install"]
  script:
    - npm install
    - rm -rf apps/frontend/node_modules
    - npm install --prefix apps/frontend --package-lock=false --include=optional
    - npm run prisma:generate --workspace=backend
    - npm run build --workspace=backend
    - npm run build --workspace=frontend

test:
  stage: test
  image: node:20-bookworm-slim
  <<: *npm_cache
  needs: ["install"]
  script:
    - npm install
    - rm -rf apps/frontend/node_modules
    - npm install --prefix apps/frontend --package-lock=false --include=optional
    - npm run lint --workspace=frontend
  allow_failure: true

.docker_job:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    DOCKER_CONFIG: "$CI_PROJECT_DIR/.docker"
  before_script:
    - mkdir -p "$DOCKER_CONFIG"
    - |
      cat > "$DOCKER_CONFIG/config.json" <<EOF
      {"auths":{"$CI_REGISTRY":{"username":"$CI_REGISTRY_USER","password":"$CI_REGISTRY_PASSWORD"}}}
      EOF

.cloud_run_job_rules: &cloud_run_job_rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "production") && $GCP_PROJECT_ID && $GCP_REGION && $GCP_SERVICE_ACCOUNT_KEY'

.cloud_run_gcp_auth:
  image: google/cloud-sdk:slim
  before_script:
    - printf '%s' "$GCP_SERVICE_ACCOUNT_KEY" > "$CI_PROJECT_DIR/gcp-key.json"
    - gcloud auth activate-service-account --key-file="$CI_PROJECT_DIR/gcp-key.json"
    - gcloud config set project "$GCP_PROJECT_ID"
    - gcloud config set run/region "$GCP_REGION"

.cloud_run_kaniko:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    DOCKER_CONFIG: "$CI_PROJECT_DIR/.docker"
    GAR_HOST: "$GCP_REGION-docker.pkg.dev"
  before_script:
    - mkdir -p "$DOCKER_CONFIG"
    - AUTH="$(printf '_json_key:%s' "$GCP_SERVICE_ACCOUNT_KEY" | base64 | tr -d '\n')"
    - printf '{"auths":{"%s":{"auth":"%s"}}}' "$GAR_HOST" "$AUTH" > "$DOCKER_CONFIG/config.json"
  <<: *cloud_run_job_rules

docker_backend:
  extends: .docker_job
  needs: ["build"]
  <<: *release_job_rules
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/apps/backend" \
        --dockerfile "$CI_PROJECT_DIR/apps/backend/Dockerfile" \
        --destination "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" \
        --destination "$CI_REGISTRY_IMAGE/backend:latest"

docker_frontend:
  extends: .docker_job
  needs: ["build"]
  <<: *release_job_rules
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/apps/frontend" \
        --dockerfile "$CI_PROJECT_DIR/apps/frontend/Dockerfile" \
        --build-arg "NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}}" \
        --destination "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" \
        --destination "$CI_REGISTRY_IMAGE/frontend:latest"

docker_backend_cloudrun:
  extends: .cloud_run_kaniko
  stage: docker
  needs: ["build"]
  script:
    - ': "${ARTIFACT_REGISTRY_REPOSITORY:?ARTIFACT_REGISTRY_REPOSITORY is required}"'
    - export IMAGE_BE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REGISTRY_REPOSITORY/backend:$CI_COMMIT_SHA"
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/apps/backend" \
        --dockerfile "$CI_PROJECT_DIR/apps/backend/Dockerfile" \
        --destination "$IMAGE_BE"

deploy_backend_cloudrun:
  stage: deploy-backend
  extends: .cloud_run_gcp_auth
  needs:
    - job: docker_backend_cloudrun
  <<: *cloud_run_job_rules
  script:
    - ': "${ARTIFACT_REGISTRY_REPOSITORY:?ARTIFACT_REGISTRY_REPOSITORY is required}"'
    - export CLOUD_RUN_BACKEND_SERVICE="${CLOUD_RUN_BACKEND_SERVICE:-backend-service}"
    - ': > cloudrun-backend.env'
    - IMAGE_TAG="$CI_COMMIT_SHA" bash infra/cloud-run/deploy-backend-migration-job.sh
    - IMAGE_TAG="$CI_COMMIT_SHA" bash infra/cloud-run/deploy-backend.sh
    - export GCP_PROJECT_NUMBER="$(gcloud projects describe "$GCP_PROJECT_ID" --format='value(projectNumber)')"
    - export BACKEND_SERVICE_URL="https://${CLOUD_RUN_BACKEND_SERVICE}-${GCP_PROJECT_NUMBER}.${GCP_REGION}.run.app"
    - test -n "$BACKEND_SERVICE_URL"
    - printf 'BACKEND_URL=%s/api\n' "$BACKEND_SERVICE_URL" > cloudrun-backend.env
    - cat cloudrun-backend.env
  artifacts:
    reports:
      dotenv: cloudrun-backend.env
  environment:
    name: cloudrun-backend

docker_frontend_cloudrun:
  extends: .cloud_run_kaniko
  stage: docker-frontend
  needs:
    - job: build
    - job: deploy_backend_cloudrun
  script:
    - ': "${ARTIFACT_REGISTRY_REPOSITORY:?ARTIFACT_REGISTRY_REPOSITORY is required}"'
    - export IMAGE_FE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REGISTRY_REPOSITORY/frontend:$CI_COMMIT_SHA"
    - export FRONTEND_API_URL="${BACKEND_URL:?BACKEND_URL is required}"
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/apps/frontend" \
        --dockerfile "$CI_PROJECT_DIR/apps/frontend/Dockerfile" \
        --build-arg "NEXT_PUBLIC_API_BASE_URL=$FRONTEND_API_URL" \
        --destination "$IMAGE_FE"

deploy_frontend_cloudrun:
  stage: deploy-frontend
  extends: .cloud_run_gcp_auth
  needs:
    - job: docker_frontend_cloudrun
    - job: deploy_backend_cloudrun
  <<: *cloud_run_job_rules
  script:
    - ': "${ARTIFACT_REGISTRY_REPOSITORY:?ARTIFACT_REGISTRY_REPOSITORY is required}"'
    - export CLOUD_RUN_FRONTEND_SERVICE="${CLOUD_RUN_FRONTEND_SERVICE:-frontend-service}"
    - export CLOUD_RUN_BACKEND_SERVICE="${CLOUD_RUN_BACKEND_SERVICE:-backend-service}"
    - export NEXT_PUBLIC_API_BASE_URL="${BACKEND_URL:?BACKEND_URL is required}"
    - IMAGE_TAG="$CI_COMMIT_SHA" bash infra/cloud-run/deploy-frontend.sh
    - export GCP_PROJECT_NUMBER="$(gcloud projects describe "$GCP_PROJECT_ID" --format='value(projectNumber)')"
    - export FRONTEND_SERVICE_URL="https://${CLOUD_RUN_FRONTEND_SERVICE}-${GCP_PROJECT_NUMBER}.${GCP_REGION}.run.app"
    - test -n "$FRONTEND_SERVICE_URL"
    - 'export FRONTEND_CLOUD_RUN_ORIGIN_PATTERN="https://${CLOUD_RUN_FRONTEND_SERVICE}-*.${GCP_REGION}.run.app"'
    - 'export BACKEND_CORS_ORIGIN_LIST="${BACKEND_CORS_ORIGIN:-http://localhost:3000,$FRONTEND_CLOUD_RUN_ORIGIN_PATTERN}"'
    - |
      case ",$BACKEND_CORS_ORIGIN_LIST," in
        *",$FRONTEND_SERVICE_URL,"*) ;;
        *) BACKEND_CORS_ORIGIN_LIST="$BACKEND_CORS_ORIGIN_LIST,$FRONTEND_SERVICE_URL" ;;
      esac
    - gcloud run services update "$CLOUD_RUN_BACKEND_SERVICE" --region "$GCP_REGION" --update-env-vars "^##^CORS_ORIGIN=$BACKEND_CORS_ORIGIN_LIST"
    - 'printf ''Frontend URL: %s\nBackend CORS origins: %s\n'' "$FRONTEND_SERVICE_URL" "$BACKEND_CORS_ORIGIN_LIST"'
  environment:
    name: cloudrun-frontend

deploy_production:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: docker_backend
    - job: docker_frontend
  rules:
    - if: '$DEPLOY_HOST && $DEPLOY_USER && $DEPLOY_SSH_PRIVATE_KEY && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "production")'
  before_script:
    - apk add --no-cache openssh-client bash
    - eval "$(ssh-agent -s)"
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" \
        "export CI_REGISTRY='$CI_REGISTRY' \
        CI_REGISTRY_IMAGE='$CI_REGISTRY_IMAGE' \
        CI_COMMIT_SHORT_SHA='$CI_COMMIT_SHORT_SHA' \
        CI_REGISTRY_USER='$CI_REGISTRY_USER' \
        CI_REGISTRY_PASSWORD='$CI_REGISTRY_PASSWORD'; \
        bash -s" \
        < infra/deploy/remote-deploy.sh
  environment:
    name: production
    url: http://$DEPLOY_HOST
