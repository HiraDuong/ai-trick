# Full stack local (Postgres + API + Next.js) — build image từ Dockerfile trong repo.
services:
  postgres:
    image: postgres:16-alpine
    container_name: ikp-postgres-stack
    restart: unless-stopped
    environment:
      POSTGRES_USER: ikp
      POSTGRES_PASSWORD: ikp_dev_secret
      POSTGRES_DB: ikp
    volumes:
      - ikp_pgdata_stack:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ikp -d ikp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: ikp-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://ikp:ikp_dev_secret@postgres:5432/ikp?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: ikp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  ikp_pgdata_stack:
