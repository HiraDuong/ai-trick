# Include file example for GitLab pipelines that build to Google Artifact Registry
# and deploy to Cloud Run. This is additive and does not replace the existing CI file.
# Root pipeline should declare these stages in order:
# docker -> deploy-backend -> docker-frontend -> deploy-frontend

.cloud_run_gcp_auth:
  image: google/cloud-sdk:slim
  before_script:
    - printf '%s' "${GCP_SERVICE_ACCOUNT_KEY:-$GCP_SERVICE_ACCOUNT_KEY_JSON}" > "$CI_PROJECT_DIR/gcp-key.json"
    - gcloud auth activate-service-account --key-file="$CI_PROJECT_DIR/gcp-key.json"
    - gcloud config set project "$GCP_PROJECT_ID"
    - gcloud config set run/region "$GCP_REGION"

.cloud_run_kaniko:
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    DOCKER_CONFIG: "$CI_PROJECT_DIR/.docker"
    GAR_HOST: "$GCP_REGION-docker.pkg.dev"
  before_script:
    - mkdir -p "$DOCKER_CONFIG"
    - AUTH="$(printf '_json_key:%s' "${GCP_SERVICE_ACCOUNT_KEY:-$GCP_SERVICE_ACCOUNT_KEY_JSON}" | base64 | tr -d '\n')"
    - printf '{"auths":{"%s":{"auth":"%s"}}}' "$GAR_HOST" "$AUTH" > "$DOCKER_CONFIG/config.json"

docker_backend_cloudrun:
  extends: .cloud_run_kaniko
  stage: docker
  script:
    - : "${ARTIFACT_REGISTRY_REPOSITORY:?ARTIFACT_REGISTRY_REPOSITORY is required}"
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/apps/backend" \
        --dockerfile "$CI_PROJECT_DIR/apps/backend/Dockerfile" \
        --destination "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REGISTRY_REPOSITORY/backend:$CI_COMMIT_SHORT_SHA" \
        --destination "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REGISTRY_REPOSITORY/backend:latest"

deploy_backend_cloudrun:
  extends: .cloud_run_gcp_auth
  stage: deploy-backend
  needs:
    - job: docker_backend_cloudrun
  script:
    - : "${ARTIFACT_REGISTRY_REPOSITORY:?ARTIFACT_REGISTRY_REPOSITORY is required}"
    - export CLOUD_RUN_BACKEND_SERVICE="${CLOUD_RUN_BACKEND_SERVICE:-backend-service}"
    - IMAGE_TAG="$CI_COMMIT_SHORT_SHA" bash infra/cloud-run/deploy-backend.sh
    - export BACKEND_SERVICE_URL="$(gcloud run services describe "$CLOUD_RUN_BACKEND_SERVICE" --region "$GCP_REGION" --format='value(status.url)')"
    - test -n "$BACKEND_SERVICE_URL"
    - printf 'BACKEND_URL=%s/api\n' "$BACKEND_SERVICE_URL" > cloudrun-backend.env
  artifacts:
    reports:
      dotenv: cloudrun-backend.env

docker_frontend_cloudrun:
  extends: .cloud_run_kaniko
  stage: docker-frontend
  needs:
    - job: deploy_backend_cloudrun
  script:
    - : "${ARTIFACT_REGISTRY_REPOSITORY:?ARTIFACT_REGISTRY_REPOSITORY is required}"
    - export FRONTEND_API_URL="${BACKEND_URL:?BACKEND_URL is required}"
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/apps/frontend" \
        --dockerfile "$CI_PROJECT_DIR/apps/frontend/Dockerfile" \
        --build-arg "NEXT_PUBLIC_API_BASE_URL=$FRONTEND_API_URL" \
        --destination "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REGISTRY_REPOSITORY/frontend:$CI_COMMIT_SHORT_SHA" \
        --destination "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REGISTRY_REPOSITORY/frontend:latest"

deploy_frontend_cloudrun:
  extends: .cloud_run_gcp_auth
  stage: deploy-frontend
  needs:
    - job: docker_frontend_cloudrun
    - job: deploy_backend_cloudrun
  script:
    - : "${ARTIFACT_REGISTRY_REPOSITORY:?ARTIFACT_REGISTRY_REPOSITORY is required}"
    - export CLOUD_RUN_FRONTEND_SERVICE="${CLOUD_RUN_FRONTEND_SERVICE:-frontend-service}"
    - export NEXT_PUBLIC_API_BASE_URL="${BACKEND_URL:?BACKEND_URL is required}"
    - IMAGE_TAG="$CI_COMMIT_SHORT_SHA" bash infra/cloud-run/deploy-frontend.sh